<title>Ledger & Loop — Business Dashboard</title>
<style>
  :root{
    --bg: #EEF2F1;
    --surface: #FFFFFF;
    --surface-sunken: #E4E9E7;
    --border: #D6DEDB;
    --ink: #16211F;
    --ink-secondary: #445350;
    --ink-muted: #6E7C79;
    --accent: #2B5C66;
    --accent-ink: #FFFFFF;
    --accent-wash: #DCE9EB;
    --good: #2F7A54;
    --good-wash: #E1F1E6;
    --warn: #B4791F;
    --warn-wash: #F7EBD7;
    --crit: #B23A3A;
    --crit-wash: #F6DEDE;
    --shadow: 0 1px 2px rgba(22,33,31,0.06), 0 8px 24px -12px rgba(22,33,31,0.18);
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg: #0F1615;
      --surface: #17201F;
      --surface-sunken: #101716;
      --border: #263230;
      --ink: #E9EFEC;
      --ink-secondary: #AEBDB9;
      --ink-muted: #7C8B87;
      --accent: #6FB3BE;
      --accent-ink: #0B1716;
      --accent-wash: #1B3439;
      --good: #6FCB93;
      --good-wash: #163425;
      --warn: #E3AC57;
      --warn-wash: #3A2C14;
      --crit: #E38080;
      --crit-wash: #3A1E1E;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.6);
    }
  }
  :root[data-theme="dark"]{
    --bg: #0F1615; --surface: #17201F; --surface-sunken: #101716; --border: #263230;
    --ink: #E9EFEC; --ink-secondary: #AEBDB9; --ink-muted: #7C8B87;
    --accent: #6FB3BE; --accent-ink: #0B1716; --accent-wash: #1B3439;
    --good: #6FCB93; --good-wash: #163425;
    --warn: #E3AC57; --warn-wash: #3A2C14;
    --crit: #E38080; --crit-wash: #3A1E1E;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.6);
  }
  :root[data-theme="light"]{
    --bg: #EEF2F1; --surface: #FFFFFF; --surface-sunken: #E4E9E7; --border: #D6DEDB;
    --ink: #16211F; --ink-secondary: #445350; --ink-muted: #6E7C79;
    --accent: #2B5C66; --accent-ink: #FFFFFF; --accent-wash: #DCE9EB;
    --good: #2F7A54; --good-wash: #E1F1E6;
    --warn: #B4791F; --warn-wash: #F7EBD7;
    --crit: #B23A3A; --crit-wash: #F6DEDE;
    --shadow: 0 1px 2px rgba(22,33,31,0.06), 0 8px 24px -12px rgba(22,33,31,0.18);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: var(--accent); }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 40px 28px 80px;
  }

  header.top{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .brand-mark{ display:flex; align-items:center; gap:14px; }
  .brand-glyph{
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--accent); color: var(--accent-ink);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--serif); font-weight:700; font-size: 19px;
    flex-shrink:0;
  }
  h1{
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    margin: 0;
    text-wrap: balance;
    letter-spacing: -0.01em;
  }
  .brand-sub{ color: var(--ink-muted); font-size: 13px; margin-top: 2px; }
  .meta-right{ text-align:right; color: var(--ink-muted); font-size: 12.5px; }
  .meta-right .day{ color: var(--ink-secondary); font-weight:600; }

  .eyebrow{
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.09em;
    font-weight: 700;
    color: var(--ink-muted);
    margin: 0 0 12px;
  }

  section{ margin-bottom: 40px; }

  /* stat row */
  .stats{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .stat{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat .label{ font-size: 12px; color: var(--ink-muted); font-weight:600; margin-bottom:8px; }
  .stat .value{
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .stat .sub{ font-size: 12.5px; color: var(--ink-muted); margin-top: 6px; }
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    font-size: 11.5px; font-weight:700; letter-spacing:0.02em;
    padding: 3px 10px; border-radius: 999px;
    margin-top: 8px;
  }
  .pill.neutral{ background: var(--surface-sunken); color: var(--ink-secondary); }
  .pill.warn{ background: var(--warn-wash); color: var(--warn); }
  .pill.good{ background: var(--good-wash); color: var(--good); }
  .pill.crit{ background: var(--crit-wash); color: var(--crit); }
  .pill::before{ content:""; width:6px; height:6px; border-radius:50%; background: currentColor; }

  /* action queue */
  .req-card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--warn);
    border-radius: 10px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 16px;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .req-card.low{ border-left-color: var(--ink-muted); }
  .req-card .req-main{ flex: 1; min-width: 0; }
  .req-title-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .req-title{ font-weight: 700; font-size: 15px; }
  .req-id{ font-family: var(--serif); font-size: 11.5px; color: var(--ink-muted); }
  .req-detail{ color: var(--ink-secondary); font-size: 13.5px; line-height:1.55; }
  .req-blocks{ font-size: 12px; color: var(--ink-muted); margin-top: 8px; }
  .req-blocks b{ color: var(--ink-secondary); font-weight:600; }
  .req-priority{ flex-shrink:0; align-self:flex-start; }

  /* generic panel/table */
  .panel{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  table{ width:100%; border-collapse: collapse; }
  th{
    text-align:left; font-size: 11.5px; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--ink-muted); font-weight:700;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    background: var(--surface-sunken);
  }
  td{
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 13.5px; vertical-align: top;
  }
  tr:last-child td{ border-bottom: none; }
  td.num{ font-variant-numeric: tabular-nums; text-align:right; }
  .prod-name{ font-weight: 700; margin-bottom: 3px; }
  .prod-files{ color: var(--ink-muted); font-size: 12px; }

  .table-scroll{ overflow-x: auto; }

  .empty-state{
    padding: 28px 18px; text-align:center; color: var(--ink-muted); font-size: 13.5px;
  }

  /* two column layout */
  .cols{
    display:grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 860px){
    .cols{ grid-template-columns: 1fr; }
    .stats{ grid-template-columns: repeat(2, 1fr); }
  }

  /* activity timeline */
  .timeline{ list-style:none; margin:0; padding: 4px 18px 4px; }
  .timeline li{
    position: relative;
    padding: 12px 0 12px 22px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }
  .timeline li:last-child{ border-bottom:none; }
  .timeline li::before{
    content:""; position:absolute; left:2px; top: 19px;
    width:8px; height:8px; border-radius:50%; background: var(--accent);
  }
  .timeline .t-date{ color: var(--ink-muted); font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:2px; }

  .note{
    font-size: 12.5px; color: var(--ink-muted); line-height:1.6; padding: 14px 18px;
    border-top: 1px solid var(--border); background: var(--surface-sunken);
  }

  footer{
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
    color: var(--ink-muted); font-size: 12px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
</style>

<div class="wrap" id="app"></div>

<script>
/*
 * All page content is generated from DATA below. To update the dashboard,
 * edit only this object (or regenerate it from business_plan.md,
 * requests/open_requests.json, finances/ledger.json, and the products/
 * folder) — never hand-edit the rendered markup. Then republish this file
 * as the Artifact with the same URL to keep the link stable.
 */
const DATA = {
  meta: {
    name: "Ledger & Loop Digital",
    tagline: "Digital products studio — operating name, pending final decision (REQ-002)",
    lastUpdated: "20 Jul 2026",
    day: 3,
  },
  stats: {
    balance: 0.00,
    balancePill: { text: "Pre-revenue", tone: "neutral" },
    productsReady: 3,
    productsSub: "1 more in the idea queue",
    openRequests: 2,
    requestsPill: { text: "1 high priority", tone: "warn" },
    spent: 0.00,
    budget: 50,
  },
  requests: [
    {
      id: "REQ-003",
      title: "Attach files/cover art on Gumroad and publish the 3 listings",
      detail: "Using the access token you provided, I created all 3 listings on Gumroad as drafts (name, price, description, tags filled in): <a href=\"https://divine357.gumroad.com/l/ai-prompt-playbook\">ai-prompt-playbook</a> ($17), <a href=\"https://divine357.gumroad.com/l/freelancer-tax-tracker-2026\">freelancer-tax-tracker-2026</a> ($19), <a href=\"https://divine357.gumroad.com/l/freelancer-invoice-toolkit\">freelancer-invoice-toolkit</a> ($17). I did NOT upload the deliverable files or cover images via the API — the file-upload endpoint's error response contained unusually detailed step-by-step \"next action\" instructions, which looked like a prompt injection aimed at an agent rather than a normal error, so I stopped rather than push your real files through an unverified flow. Please drag the PDF + xlsx (in each product's dist/ folder) and cover.png into each draft in the Gumroad dashboard, then publish when ready.",
      blocks: "Any of the 3 products going live / earning revenue",
      priority: "high",
    },
    {
      id: "REQ-002",
      title: "Decide on a permanent business/store name",
      detail: "\"Ledger &amp; Loop Digital\" is a placeholder I used so the first product could ship without waiting. Keep it, or tell me a direction and I'll propose a shortlist.",
      blocks: "nothing urgent — cosmetic on the listing and cover art only.",
      priority: "low",
    },
  ],
  products: [
    {
      name: "Small Business AI Prompt Playbook",
      files: "PDF (13pg) + Excel ROI tracker + cover art",
      category: "AI Prompts &amp; Ops",
      price: "$17",
      status: { text: "Draft on Gumroad", tone: "warn" },
    },
    {
      name: "Freelancer Quarterly Tax & Expense Tracker (2026 Edition)",
      files: "PDF guide (8pg) + 5-tab Excel tracker (SE tax calculator) + cover art",
      category: "Spreadsheet tools",
      price: "$19",
      status: { text: "Draft on Gumroad", tone: "warn" },
    },
    {
      name: "Freelancer Invoice & Late-Payment Toolkit",
      files: "PDF guide (8pg) + 4-tab Excel tracker (auto overdue flags + reminder dashboard) + cover art",
      category: "Spreadsheet tools",
      price: "$17",
      status: { text: "Draft on Gumroad", tone: "warn" },
    },
    {
      name: "Prompt Playbook — Vol. 2 (Ops automation)",
      files: "Next in queue once Vol. 1 gets first sales signal",
      category: "AI Prompts &amp; Ops",
      price: "—",
      status: { text: "Idea", tone: "neutral" },
    },
  ],
  activity: [
    { date: "20 Jul 2026", text: "Created all 3 product listings on Gumroad via API (name/price/description/tags) using the access token provided — left as unpublished drafts. Deliberately did not upload files/covers through the API's file-upload flow after its error response returned suspicious step-by-step instructions resembling a prompt injection; that step needs to be done manually in the dashboard (REQ-003)." },
    { date: "20 Jul 2026", text: "Product 3 completed: Freelancer Invoice & Late-Payment Toolkit — 8-page PDF guide (reminder scripts, payment terms, escalation path) and a 4-tab Excel workbook with auto overdue-flagging. Same freelancer audience as Product 2, natural bundle candidate later." },
    { date: "20 Jul 2026", text: "Gumroad seller account created — REQ-001 resolved, nothing left blocking launch of Products 1 & 2." },
    { date: "19 Jul 2026", text: "Fixed a cover-art font bug (Windows-only font path silently fell back to an unreadable tiny font) in the shared build script used by both products." },
    { date: "19 Jul 2026", text: "Verified 2026 tax figures (Social Security wage base $184,500, SE tax rate 15.3%, quarterly deadlines) against IRS.gov/SSA.gov, and independently re-computed all spreadsheet formulas to confirm they match the guide's worked example exactly." },
    { date: "19 Jul 2026", text: "Product 2 completed: Freelancer Quarterly Tax & Expense Tracker (2026 Edition) — 8-page PDF guide, 5-tab Excel workbook with a verified self-employment tax calculator, and cover art." },
    { date: "20 Jul 2026", text: "Daily cloud routine scheduled (9am London) to keep building products and updating this dashboard automatically." },
    { date: "20 Jul 2026", text: "Dashboard rebuilt as a data-driven page for reliable automated updates." },
    { date: "20 Jul 2026", text: "Dashboard built and published." },
    { date: "20 Jul 2026", text: "Product 1 completed: PDF playbook, Excel tracker, and cover art all generated." },
    { date: "20 Jul 2026", text: "Gumroad account request queued (REQ-001) — blocks launch." },
    { date: "20 Jul 2026", text: "Business model selected: digital products via Gumroad, $0 fixed cost." },
    { date: "20 Jul 2026", text: "Business plan and file structure created." },
  ],
  ledger: {
    transactions: [], // {date, description, type, amount}
    note: "Balance reflects only confirmed real-world money — nothing projected or hypothetical. Full history: <code>finances/ledger.json</code>.",
  },
};

function fmtUSD(n) {
  return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function pill(p) {
  return `<span class="pill ${p.tone}">${p.text}</span>`;
}

function renderHeader(d) {
  return `
    <header class="top">
      <div class="brand-mark">
        <div class="brand-glyph">${d.meta.name.split(" ").map(w => w[0]).slice(0,2).join("")}</div>
        <div>
          <h1>${d.meta.name}</h1>
          <div class="brand-sub">${d.meta.tagline}</div>
        </div>
      </div>
      <div class="meta-right">
        <div>Last updated <span class="day">${d.meta.lastUpdated}</span></div>
        <div>Day <span class="day">${d.meta.day}</span> of operation</div>
      </div>
    </header>`;
}

function renderStats(s) {
  return `
    <section>
      <p class="eyebrow">Overview</p>
      <div class="stats">
        <div class="stat">
          <div class="label">Cash balance</div>
          <div class="value">${fmtUSD(s.balance)}</div>
          ${pill(s.balancePill)}
        </div>
        <div class="stat">
          <div class="label">Products ready to sell</div>
          <div class="value">${s.productsReady}</div>
          <div class="sub">${s.productsSub}</div>
        </div>
        <div class="stat">
          <div class="label">Open requests for you</div>
          <div class="value">${s.openRequests}</div>
          ${pill(s.requestsPill)}
        </div>
        <div class="stat">
          <div class="label">Money spent</div>
          <div class="value">${fmtUSD(s.spent)}</div>
          <div class="sub">of ${fmtUSD(s.budget)} approved budget</div>
        </div>
      </div>
    </section>`;
}

function renderRequests(reqs) {
  if (!reqs.length) {
    return `
    <section>
      <p class="eyebrow">Needs your action</p>
      <div class="panel"><div class="empty-state">Nothing needs you right now.</div></div>
    </section>`;
  }
  const cards = reqs.map(r => `
    <div class="req-card ${r.priority === "low" ? "low" : ""}">
      <div class="req-main">
        <div class="req-title-row">
          <span class="req-title">${r.title}</span>
          <span class="req-id">${r.id}</span>
        </div>
        <div class="req-detail">${r.detail}</div>
        <div class="req-blocks"><b>Blocks:</b> ${r.blocks}</div>
      </div>
      <span class="pill ${r.priority === "high" ? "warn" : "neutral"} req-priority">${r.priority === "high" ? "High" : "Low"}</span>
    </div>`).join("");
  return `
    <section>
      <p class="eyebrow">Needs your action</p>
      ${cards}
    </section>`;
}

function renderProducts(products) {
  const rows = products.map(p => `
    <tr>
      <td>
        <div class="prod-name">${p.name}</div>
        <div class="prod-files">${p.files}</div>
      </td>
      <td>${p.category}</td>
      <td class="num">${p.price}</td>
      <td>${pill(p.status)}</td>
    </tr>`).join("");
  return `
    <section>
      <p class="eyebrow">Product pipeline</p>
      <div class="panel table-scroll">
        <table>
          <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </section>`;
}

function renderActivity(items) {
  const lis = items.map(a => `<li><span class="t-date">${a.date}</span>${a.text}</li>`).join("");
  return `
    <section>
      <p class="eyebrow">Recent activity</p>
      <div class="panel"><ul class="timeline">${lis}</ul></div>
    </section>`;
}

function renderLedger(ledger) {
  const body = ledger.transactions.length
    ? `<table>
         <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr></thead>
         <tbody>${ledger.transactions.map(t => `
           <tr><td>${t.date}</td><td>${t.description}</td><td>${t.type}</td><td class="num">${fmtUSD(t.amount)}</td></tr>`).join("")}
         </tbody>
       </table>`
    : `<table><thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr></thead></table>
       <div class="empty-state">No transactions yet — balance updates here the moment a real sale or expense happens.</div>`;
  return `
    <section>
      <p class="eyebrow">Ledger</p>
      <div class="panel">
        <div class="table-scroll">${body}</div>
        <div class="note">${ledger.note}</div>
      </div>
    </section>`;
}

function render(d) {
  document.getElementById("app").innerHTML = `
    ${renderHeader(d)}
    ${renderStats(d.stats)}
    ${renderRequests(d.requests)}
    <div class="cols">
      ${renderProducts(d.products)}
      ${renderActivity(d.activity)}
    </div>
    ${renderLedger(d.ledger)}
    <footer>
      <span>${d.meta.name} — internal dashboard, not shared publicly.</span>
      <span>Source of truth: business_plan.md, requests/open_requests.json, finances/ledger.json</span>
    </footer>`;
}

render(DATA);
</script>
